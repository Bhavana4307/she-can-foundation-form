<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>She Can Foundation Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #6a1b9a;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #6a1b9a;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #success {
            display: none;
            text-align: center;
            color: green;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>She Can Foundation</h2>

    <form id="contactForm">
        <input type="text" placeholder="Enter Name" required>
        <input type="email" placeholder="Enter Email" required>
        <textarea placeholder="Enter Message" rows="4" required></textarea>
        <button type="submit">Submit</button>
    </form>

    <div id="success">
        Form Submitted Successfully ✅
    </div>
</div>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
    e.preventDefault();
    document.getElementById("success").style.display = "block";
    this.reset();
});
</script>

</body>
</html>
